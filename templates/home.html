<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Docker CI/CD</title>
</head>
<body style="background-color: #1d1919; color: #fff;">
    <div>
        <h1 style="font-size: 3rem;">{{ title }}</h1>
    </div>

    <hr>
    
    <div style="margin-top: 20px;">
        {% if users %}
        <h3 style="font-size: 1.5rem;">Users:</h3>
        <ul style="list-style-type: number; padding: 0;">
            {% for user in users %}
                <li style="margin: 10px 40px;">{{ user.username }}</li>
            {% endfor %}
            </ul>
        {% else %}
            <p style="color: #ccc;">No users found.</p>
        {% endif %}
    </div>
    
</body>
</html>
